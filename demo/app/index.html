<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent77 Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #64748b; margin-bottom: 2rem; line-height: 1.6; }
    .login-link {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #0f172a;
      color: #fff;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .login-link:hover { background: #1e293b; }
    #user-info {
      display: none;
      margin-top: 2rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      text-align: left;
    }
    #user-info p { color: #1e293b; margin-bottom: 0.5rem; }
    .logout-link { color: #ef4444; text-decoration: underline; cursor: pointer; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent77 Demo</h1>
    <p>Try the AI chatbot widget. Log in to get started, then use the chat bubble in the bottom-right corner.</p>

    <div id="auth-section">
      <a id="login-btn" class="login-link" href="/api/auth/login">Log in with Cognito</a>
    </div>

    <div id="user-info">
      <p><strong>Logged in as:</strong> <span id="user-email"></span></p>
      <a class="logout-link" href="/api/auth/logout">Log out</a>
    </div>
  </div>

  <script>
    // Check if the user is logged in
    fetch('/api/auth/me', { credentials: 'include' })
      .then(function(res) {
        if (!res.ok) return null;
        return res.json();
      })
      .then(function(data) {
        if (data && data.email) {
          document.getElementById('auth-section').style.display = 'none';
          document.getElementById('user-info').style.display = 'block';
          document.getElementById('user-email').textContent = data.email;
          loadWidget();
        }
      })
      .catch(function() {});

    function loadWidget() {
      var s = document.createElement('script');
      s.src = '${widget_url}';
      s.setAttribute('data-runtime-url', '${runtime_url}');
      s.setAttribute('data-token-url', '/api/chatbot-token');
      s.async = true;
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
