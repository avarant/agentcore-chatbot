<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent77 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; background: #fff; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 12px 20px; gap: 12px;
    }
    #topbar .user-email { color: #666; font-size: 13px; }
    #topbar .sign-out {
      background: none; border: 1px solid #ccc; color: #666;
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #topbar .sign-out:hover { border-color: #999; color: #333; }
    #login-prompt {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
    }
    #login-prompt a {
      display: inline-block; padding: 10px 24px;
      background: #111; color: #fff; text-decoration: none;
      border-radius: 6px; font-size: 14px;
    }
    #login-prompt a:hover { background: #333; }
  </style>
</head>
<body>
  <div id="topbar" style="display:none">
    <span class="user-email" id="user-email"></span>
    <button class="sign-out" onclick="window.location.href='/api/auth/logout'">Sign Out</button>
  </div>

  <div id="login-prompt">
    <a href="/api/auth/login">Log In</a>
  </div>

  <script>
    fetch('/api/auth/me', { credentials: 'include' })
      .then(function(res) { return res.ok ? res.json() : null; })
      .then(function(data) {
        var email = data && (data.email || (data.user && data.user.email));
        if (email) {
          document.getElementById('login-prompt').style.display = 'none';
          document.getElementById('topbar').style.display = 'flex';
          document.getElementById('user-email').textContent = email;

          var s = document.createElement('script');
          s.src = '${widget_url}';
          s.setAttribute('data-runtime-url', '${runtime_url}');
          s.setAttribute('data-token-url', '/api/auth/token');
          s.async = true;
          document.head.appendChild(s);
        }
      })
      .catch(function() {});
  </script>
</body>
</html>
